# ── github-graphs: Weight Chart ───────────────────────────────────────────────
# Runs automatically when weight-tracking.md is pushed.
# Trigger manually from the Actions tab to change the rolling window.

name: Generate Weight Chart

on:
  push:
    paths:
      - 'health-tracking/weight-tracking.md'
  workflow_dispatch:
    inputs:
      months:
        description: 'Rolling window in months'
        default: '6'
        required: false

jobs:
  generate-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install matplotlib numpy python-dateutil

      - name: Generate chart
        env:
          # ── Window & paths ─────────────────────────────────────────────────
          MONTHS: ${{ github.event.inputs.months || '6' }}
          INPUT_FILE:  health-tracking/weight-tracking.md
          OUTPUT_FILE: health-tracking/charts/weight-chart.svg

          # ── Column selection ───────────────────────────────────────────────
          DATE_COL: 'Date'
          Y1_COL:   'Weight'
          Y2_COL:   'Body Fat'

          # ── Labels & title ─────────────────────────────────────────────────
          Y1_LABEL: 'Weight (lbs)'
          Y2_LABEL: 'Body Fat %'
          TITLE:    'Weight Tracking'

          # ── Value parsing ──────────────────────────────────────────────────
          STRIP_CHARS: '%'
          SHOW_TREND:  'true'

        run: python health-tracking/generate_chart.py

      - name: Commit chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health-tracking/charts/weight-chart.svg
          git diff --cached --quiet || git commit -m "chore: update weight chart [skip ci]"
          git push
