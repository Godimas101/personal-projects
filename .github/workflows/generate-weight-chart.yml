# ── table-to-chart: Weight & Metrics Charts ───────────────────────────────────
# Runs automatically when weight-tracking.md is pushed.
# Trigger manually from the Actions tab to change the rolling window.

name: Generate Weight Chart

on:
  push:
    paths:
      - 'health-tracking/weight-tracking.md'
  workflow_dispatch:
    inputs:
      months:
        description: 'Rolling window in months'
        default: '4'
        required: false

jobs:
  generate-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHART_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install matplotlib numpy python-dateutil

      - name: Generate weight chart
        env:
          MONTHS: ${{ github.event.inputs.months || '4' }}
          INPUT_FILE:    health-tracking/weight-tracking.md
          OUTPUT_FILE:   health-tracking/charts/weight-chart.svg
          DATE_COL:      'Date'
          Y1_COL:        'Weight'
          Y2_COLS:       ''
          Y1_LABEL:      'Weight (lbs)'
          Y2_LABELS:     ''
          Y2_AXIS_LABEL: ''
          TITLE:         'Weight'
          STRIP_CHARS:   '%'
          SHOW_TREND:    'true'
        run: python health-tracking/generate_chart.py

      - name: Generate metrics chart
        env:
          MONTHS: ${{ github.event.inputs.months || '4' }}
          INPUT_FILE:    health-tracking/weight-tracking.md
          OUTPUT_FILE:   health-tracking/charts/metrics-chart.svg
          DATE_COL:      'Date'
          Y1_COL:        'Muscle'
          Y2_COLS:       'Body Fat,BMI'
          Y1_LABEL:      'Muscle %'
          Y2_LABELS:     'Body Fat %,BMI'
          Y2_AXIS_LABEL: ''
          TITLE:         'Body Metrics'
          STRIP_CHARS:   '%'
          SHOW_TREND:    'true'
        run: python health-tracking/generate_chart.py

      - name: Commit charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health-tracking/charts/weight-chart.svg health-tracking/charts/metrics-chart.svg
          git diff --cached --quiet || git commit -m "chore: update weight and metrics charts [skip ci]"
          git push
