<?xml version="1.0" encoding="utf-8"?>
<EssentialsConfig xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <AutoCommands>
    <!-- AUTO-SAVE: every 5 minutes -->
    <AutoCommand>
      <Enabled>true</Enabled>
      <CommandTrigger>Timed</CommandTrigger>
      <Name>AutoSave</Name>
      <Interval>00:05:00</Interval>
      <OnStart>false</OnStart>
      <DayOfWeek>All</DayOfWeek>
      <Steps>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!save</Command>
        </CommandStep>
      </Steps>
    </AutoCommand>
    <!-- SCHEDULED RESTART: every 4 hours with warnings and cleanup -->
    <AutoCommand>
      <Enabled>true</Enabled>
      <CommandTrigger>Timed</CommandTrigger>
      <Name>ScheduledRestart</Name>
      <Interval>04:00:00</Interval>
      <OnStart>false</OnStart>
      <DayOfWeek>All</DayOfWeek>
      <Steps>
        <!-- Delays are RELATIVE to the previous step. Cycle fires every 4h; the
             chain below takes ~15 min total before the !restart 30 fires. -->
        <!-- 15 minute warning (fires immediately when cycle starts) -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!notify "Server restart in 15 minutes." 30000</Command>
        </CommandStep>
        <!-- 10 minute warning (5 min after 15-min warning) -->
        <CommandStep>
          <Delay>00:05:00</Delay>
          <Command>!notify "Server restart in 10 minutes." 30000</Command>
        </CommandStep>
        <!-- 5 minute warning (5 min after 10-min warning) -->
        <CommandStep>
          <Delay>00:05:00</Delay>
          <Command>!notify "Server restart in 5 minutes." 30000</Command>
        </CommandStep>
        <!-- 1 minute warning (4 min after 5-min warning) -->
        <CommandStep>
          <Delay>00:04:00</Delay>
          <Command>!notify "Server restart in 1 minute." 30000</Command>
        </CommandStep>
        <!-- 30 second warning + cleanup begins (30 sec after 1-min warning) -->
        <CommandStep>
          <Delay>00:00:30</Delay>
          <Command>!notify "Server restart in 30 seconds. Cleanup in progress." 30000</Command>
        </CommandStep>
        <!-- Cleanup: voxels -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!voxels cleanup asteroids</Command>
        </CommandStep>
        <!-- Cleanup: floating objects -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete floatingobjects</Command>
        </CommandStep>
        <!-- Cleanup: disable projectors -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type Projector</Command>
        </CommandStep>
        <!-- Cleanup: disable welders -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type ShipWelder</Command>
        </CommandStep>
        <!-- Cleanup: delete unowned grids -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete ownedby nobody</Command>
        </CommandStep>
        <!-- Cleanup: delete grids under 30 blocks -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete blockslessthan 30</Command>
        </CommandStep>
        <!-- Save and restart — !restart 30 has its own 30-sec countdown,
             so the "30 second warning" above lines up with the actual restart. -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!save</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!restart 30</Command>
        </CommandStep>
      </Steps>
    </AutoCommand>
    <!-- VOTE RESTART: players can trigger an early restart -->
    <AutoCommand>
      <Enabled>true</Enabled>
      <CommandTrigger>Vote</CommandTrigger>
      <Name>VoteRestart</Name>
      <Interval>00:01:00</Interval>
      <OnStart>false</OnStart>
      <DayOfWeek>All</DayOfWeek>
      <TriggerRatio>0.5</TriggerRatio>
      <Steps>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!notify "Vote passed! Server restarting in 30 seconds." 30000</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!voxels cleanup asteroids</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete floatingobjects</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type Projector</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type ShipWelder</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete ownedby nobody</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete blockslessthan 30</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!save</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:30</Delay>
          <Command>!restart 30</Command>
        </CommandStep>
      </Steps>
    </AutoCommand>
  </AutoCommands>
  <InfoCommands />
  <Motd>=== STURMGRENADIER SEASON 06 ===

[ SERVER RESTARTS — EVERY 4 HOURS ]
Warnings broadcast at 15 min, 10 min, 5 min, 1 min, and 30 sec before restart.
Cleanup runs JUST BEFORE each restart:
  - Loose items (floating objects) are deleted
  - Voxel debris from mining is cleared
  - ALL projectors are turned OFF (not deleted)
  - ALL ship welders are turned OFF (not deleted)
  - Grids OWNED BY NOBODY are deleted
  - Grids with FEWER THAN 30 BLOCKS are deleted
  - World is saved
HEADS UP: keep small outposts above 30 blocks if you want them to survive the restart. Unowned grids also get cleaned up — claim them.

[ COMMANDS — Player ]

MOTD:
  !motd                       -- show this message

Vote Restart:
  !vote VoteRestart           -- 50% of online players triggers an early restart with the same cleanup as the scheduled one

Ship Fixer (unstick bugged grids):
  !fixship                    -- fix the grid you are looking at
  !fixship NAME               -- fix a grid by name (must be the owner)
  2 minute cooldown per player. Exit all seats before using.

Block Limits (weapons, tools, and production blocks are capped):
  !blocklimit mylimit         -- show your current violations
  !blocklimit limits          -- show all server rules
  !blocklimit update mylimit  -- refresh your data (5 min cooldown)
Blocks over the limit will be SHUT OFF automatically. Check the README for the full list of rules.

Auto-save:
  Every 5 minutes, automatic. No command needed.

[ MORE INFO ]
Full server info, mod list, and detailed block limits:
https://github.com/Godimas101/personal-projects/blob/main/sturmgrenadier/space-engineers/season-06/README.md</Motd>
  <EnableRanks>false</EnableRanks>
  <DefaultRank>Default</DefaultRank>
  <OverrideVanillaPerms>false</OverrideVanillaPerms>
  <EnableHomes>false</EnableHomes>
  <NewUserMotdUrl>false</NewUserMotdUrl>
  <StopShipsOnStart>false</StopShipsOnStart>
  <UtilityShowPosition>false</UtilityShowPosition>
  <MarkerShowPosition>false</MarkerShowPosition>
  <BackpackLimit>1</BackpackLimit>
  <CutGameTags>false</CutGameTags>
</EssentialsConfig>
