<?xml version="1.0" encoding="utf-8"?>
<EssentialsConfig xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <AutoCommands>
    <!-- AUTO-SAVE: every 10 minutes -->
    <AutoCommand>
      <Enabled>true</Enabled>
      <CommandTrigger>Timed</CommandTrigger>
      <Name>AutoSave</Name>
      <Interval>00:05:00</Interval>
      <OnStart>false</OnStart>
      <DayOfWeek>All</DayOfWeek>
      <Steps>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!save</Command>
        </CommandStep>
      </Steps>
    </AutoCommand>
    <!-- SCHEDULED RESTART: every 4 hours with warnings and cleanup -->
    <AutoCommand>
      <Enabled>true</Enabled>
      <CommandTrigger>Timed</CommandTrigger>
      <Name>ScheduledRestart</Name>
      <Interval>04:00:00</Interval>
      <OnStart>false</OnStart>
      <DayOfWeek>All</DayOfWeek>
      <Steps>
        <!-- 15 minute warning -->
        <CommandStep>
          <Delay>00:05:00</Delay>
          <Command>!notify "Server restart in 15 minutes." 30000</Command>
        </CommandStep>
        <!-- 10 minute warning -->
        <CommandStep>
          <Delay>00:09:30</Delay>
          <Command>!notify "Server restart in 10 minutes." 30000</Command>
        </CommandStep>
        <!-- 30 second warning -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!notify "Server restart in 30 seconds. Cleanup in progress." 30000</Command>
        </CommandStep>
        <!-- Cleanup: voxels -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!voxels cleanup asteroids</Command>
        </CommandStep>
        <!-- Cleanup: floating objects -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete floatingobjects</Command>
        </CommandStep>
        <!-- Cleanup: disable projectors -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type Projector</Command>
        </CommandStep>
        <!-- Cleanup: disable welders -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type ShipWelder</Command>
        </CommandStep>
        <!-- Cleanup: delete unowned grids -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete ownedby nobody</Command>
        </CommandStep>
        <!-- Cleanup: delete grids under 30 blocks -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete blockslessthan 30</Command>
        </CommandStep>
        <!-- Save and restart -->
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!save</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:30</Delay>
          <Command>!restart 30</Command>
        </CommandStep>
      </Steps>
    </AutoCommand>
    <!-- VOTE RESTART: players can trigger an early restart -->
    <AutoCommand>
      <Enabled>true</Enabled>
      <CommandTrigger>Vote</CommandTrigger>
      <Name>VoteRestart</Name>
      <Interval>00:01:00</Interval>
      <OnStart>false</OnStart>
      <DayOfWeek>All</DayOfWeek>
      <TriggerRatio>0.5</TriggerRatio>
      <Steps>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!notify "Vote passed! Server restarting in 30 seconds." 30000</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!voxels cleanup asteroids</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete floatingobjects</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type Projector</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!blocks off type ShipWelder</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete ownedby nobody</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!cleanup delete blockslessthan 30</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:00</Delay>
          <Command>!save</Command>
        </CommandStep>
        <CommandStep>
          <Delay>00:00:30</Delay>
          <Command>!restart 30</Command>
        </CommandStep>
      </Steps>
    </AutoCommand>
  </AutoCommands>
  <InfoCommands />
  <Motd></Motd>
  <EnableRanks>false</EnableRanks>
  <DefaultRank>Default</DefaultRank>
  <OverrideVanillaPerms>false</OverrideVanillaPerms>
  <EnableHomes>false</EnableHomes>
  <NewUserMotdUrl>false</NewUserMotdUrl>
  <StopShipsOnStart>false</StopShipsOnStart>
  <UtilityShowPosition>false</UtilityShowPosition>
  <MarkerShowPosition>false</MarkerShowPosition>
  <BackpackLimit>1</BackpackLimit>
  <CutGameTags>false</CutGameTags>
</EssentialsConfig>
