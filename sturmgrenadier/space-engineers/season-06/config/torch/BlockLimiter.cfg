<?xml version="1.0" encoding="utf-8"?>
<BlockLimiterConfig xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <LimitItems>

    <!--
      NJFL COVERAGE (Not Just For Looks — SG Core Mod, Godimas101/se-mods)
      ====================================================================
      NJFL upgrades existing Keen DLC reskin/Warfare2 blocks without changing
      their BlockPairName, so SearchType=PairNames automatically groups them
      with their vanilla counterparts below.

      Covered pair names:
        Turrets:      GatlingTurretReskin, MissileTurretReskin (Warfare1 DLC)
        Fixed weps:   GatlingGunWarfare2, RocketLauncherWarfare2 (Warfare2, SG only)
        Ship tools:   DrillReskin, ShipWelderReskin, ShipGrinderReskin (Warfare1)
        Production:   AssemblerIndustrial, RefineryIndustrial, OxygenGeneratorLab
      Not limited (neither vanilla nor NJFL): reactors, batteries, thrusters,
      cargo, tanks, wind turbines, ore detectors.
    -->

    <!-- ==================== UMBRELLA WEAPON LIMITS ==================== -->
    <!-- Total weapons per station (excludes interior turrets, includes turret controllers) -->
    <LimitItem>
      <Name>Total Weapons (Stations)</Name>
      <BlockList>
        <string>GatlingTurret</string>
        <string>GatlingTurretReskin</string>
        <string>MissileTurret</string>
        <string>MissileTurretReskin</string>
        <string>AutoCannonTurret</string>
        <string>LargeCalibreTurret</string>
        <string>MediumCalibreTurret</string>
        <string>GatlingGun</string>
        <string>GatlingGunWarfare2</string>
        <string>Autocannon</string>
        <string>RocketLauncher</string>
        <string>RocketLauncherWarfare2</string>
        <string>SmallRocketLauncherReload</string>
        <string>LargeCalibreGun</string>
        <string>MediumCalibreGun</string>
        <string>Railgun</string>
        <string>TurretControlBlock</string>
        <string>Artillery_MKII</string>
        <string>ElindisGaussTurret</string>
        <string>ElindisTorpedoTurret</string>
        <string>ElindisHailstormTurret</string>
        <string>ElindisTorpedoLauncher</string>
      </BlockList>
      <SearchType>Auto</SearchType>
      <Limit>18</Limit>
      <LimitGrids>true</LimitGrids>
      <LimitPlayers>false</LimitPlayers>
      <LimitFaction>false</LimitFaction>
      <GridTypeBlock>StationsOnly</GridTypeBlock>
      <IgnoreNpcs>true</IgnoreNpcs>
      <RestrictProjection>false</RestrictProjection>
      <Punishment>ShutOffBlock</Punishment>
      <Annoy>true</Annoy>
      <Exceptions />
      <LimitFilterType>None</LimitFilterType>
      <LimitFilterOperator>LessThan</LimitFilterOperator>
    </LimitItem>

