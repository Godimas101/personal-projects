  <MessageOfTheDay>WELCOME TO STURMGRENADIER SEASON 06

Quantum Hangar: Store ships to free up server resources.
  !hangar save  — Save the grid you are looking at
  !hangar load  — Load a stored grid near you
  !hangar list  — View your stored grids
You have 10 hangar slots. Grids must be 100+ blocks.
Mobile grids from inactive players are auto-hangared after 7 days.

Ship Fixer: Unstick bugged grids that won't move or stop.
  !fixship       — Fix the grid you are looking at
  !fixship name  — Fix a grid by name (must be owner)
  2 minute cooldown. Exit all seats before using.

Vote Restart: Trigger an early server restart.
  !vote VoteRestart — Start a vote (needs 50% of online players)

Block Limits: Weapons, tools, and production blocks are limited.
  !blocklimit mylimit  — Check your current limits and violations
  !blocklimit limits   — View all server block limit rules
Blocks over the limit will be shut off. Check the README for full details.

Full server info, block restrictions, and mod list:
https://github.com/Godimas101/personal-projects/blob/main/sturmgrenadier/space-engineers/season-06/README.md</MessageOfTheDay>
